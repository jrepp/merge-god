name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs-cms/**'
      - '**/*.md'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs-cms/**'
      - '**/*.md'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    name: node:test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CI
        shell: bash
        run: |
          set -o pipefail
          npm run ci 2>&1 | tee ci-output.txt

      - name: Comment coverage on PR
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- merge-god-coverage-report -->';
            const outputPath = 'ci-output.txt';

            if (!fs.existsSync(outputPath)) {
              core.info('No CI output file found; skipping coverage comment.');
              return;
            }

            const output = fs.readFileSync(outputPath, 'utf8');
            const allFilesMatch = output.match(/all files\s+\|\s+([\d.]+)\s+\|\s+([\d.]+)\s+\|\s+([\d.]+)/);
            if (!allFilesMatch) {
              core.info('No coverage summary found; skipping coverage comment.');
              return;
            }

            const [, lines, branches, functions] = allFilesMatch;
            const body = [
              marker,
              '## Coverage',
              '',
              '| Metric | Current | Threshold |',
              '| --- | ---: | ---: |',
              `| Lines | ${lines}% | 70% |`,
              `| Branches | ${branches}% | 55% |`,
              `| Functions | ${functions}% | 65% |`,
              '',
              '_Generated by `npm run test:coverage:check`._',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
