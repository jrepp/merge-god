name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs-cms/**'
      - '**/*.md'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs-cms/**'
      - '**/*.md'

permissions:
  contents: read

jobs:
  test:
    name: node:test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CI
        run: npm run ci
