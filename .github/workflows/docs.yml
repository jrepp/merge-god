name: Docs Validation

on:
  push:
    branches: [main]
    paths:
      - 'docs-cms/**'
      - 'docs/metro-spec/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs-cms/**'
      - 'docs/metro-spec/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

jobs:
  docuchango:
    name: docuchango validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docuchango
        # Pinned to the 1.12.x line used for local validation; bump after revalidating.
        run: pip install 'docuchango>=1.12.3,<1.13'

      - name: Validate docs-cms
        run: docuchango validate --verbose
