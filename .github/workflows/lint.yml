name: Lint and Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  local-ci:
    name: Local CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run local CI
        run: npm run ci

  # Run general file-check hooks (trailing whitespace, EOF, YAML, JSON, etc.)
  pre-commit-checks:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit file-check hooks on all files
        run: |
          for hook in trailing-whitespace end-of-file-fixer check-yaml \
                      check-added-large-files check-json check-toml \
                      check-merge-conflict check-case-conflict \
                      detect-private-key mixed-line-ending; do
            echo "::group::pre-commit: $hook"
            pre-commit run "$hook" --all-files
            echo "::endgroup::"
          done
