# merge-god Configuration File
#
# This file defines which repositories to process and their settings.
# Copy this file to config.yaml and customize for your setup.
#
# Usage:
#   ./dashboard.py config.yaml
#
# Or specify a different config file:
#   ./dashboard.py /path/to/my-config.yaml

# List of repositories to monitor and process
repos:
  # Example repository 1
  - path: /Users/jrepp/dev/my-project
    name: "My Project"
    enabled: true
    watch_issues: true  # Monitor issues with "for-impl" label (default: false)
    interactive: true   # Prompt for confirmation before actions in TUI mode (default: true)
    # Optional: custom settings (future)
    # poll_interval: 300  # seconds between checks
    # notifications: true  # send notifications for this repo

  # Example repository 2
  - path: /Users/jrepp/dev/another-repo
    name: "Another Repo"
    enabled: true

  # Example disabled repository
  - path: /Users/jrepp/dev/disabled-repo
    name: "Disabled Project"
    enabled: false  # Set to false to skip this repo

# Global settings (future)
# dashboard:
#   refresh_rate: 0.5  # seconds between display updates
#   max_log_lines: 100  # max log lines to display per repo
#   theme: "dark"  # dark or light

# notification:
#   enabled: true
#   topic: "merge-god-sez"

# Interactive Mode (optional, per-repo setting)
# When enabled (default: true), the TUI will prompt for confirmation before:
#   - Processing each PR
#   - Making commits
#   - Pushing changes
#   - Merging PRs
#   - Creating new PRs from issues
# In non-TUI mode, this setting is ignored (always runs non-interactively)
# Set "interactive: false" to run fully automated without prompts

# Issue Watching (optional, per-repo setting)
# When enabled, monitors GitHub issues with "for-impl" label
# Issues are processed as PRIMARY tasks (before PRs)
# The agent will:
#   1. Create a new branch from the issue
#   2. Implement the feature/fix described in the issue
#   3. Create a PR with the implementation
#   4. Link the PR back to the issue
# Set "watch_issues: true" in repo config to enable

# Doormat credential management (optional)
# If doormat is installed, specify the command to refresh credentials
# If not specified, dashboard will try common patterns automatically
# doormat:
#   command: ["doormat"]  # Simple command
#   # OR
#   command: ["doormat", "login"]  # With subcommand
#   # OR
#   command: ["doormat", "aws", "login"]  # AWS-specific
#   timeout: 30  # seconds (default: 30)

# PR Processing Configuration
# The system uses Claude Agent SDK for structured PR processing with:
# - Task decomposition (analyze, resolve conflicts, fix CI, etc.)
# - Real-time streaming and progress updates
# - Tool calling (file editing, test running, git operations)
# - Structured action tracking and error recovery
#
# Authentication options:
#
# Option 1: AWS Bedrock (recommended for AWS users)
#   export CLAUDE_CODE_USE_BEDROCK=1
#   export ANTHROPIC_MODEL="global.anthropic.claude-sonnet-4-5-20250929-v1:0"
#   export ANTHROPIC_SMALL_FAST_MODEL_AWS_REGION="us-west-1"
#
# Option 2: Direct Anthropic API
#   export ANTHROPIC_API_KEY="your-api-key-here"
#   export ANTHROPIC_MODEL="claude-sonnet-4-5-20250929"
#
# See AGENT_SDK_USAGE.md for detailed documentation
