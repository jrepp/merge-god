description: merge-god prompt rendering contract

prompts:
  - " "

providers:
  - id: file://providers/merge-god-prompt-provider.ts
    label: merge-god-render-contract
    config:
      dryRun: true

defaultTest:
  assert:
    - type: not-contains
      value: "Promptfoo Candidate Instructions"

tests:
  - description: PR prompt includes blockers, review signal, CI signal, and repo rules
    vars:
      prompt_kind: pr
      guidelines: "Run npm test before pushing."
      commit_examples: "feat: prior commit"
      merge_rules: "Source: `.merge-rules.yaml`"
      pr_details:
        number: 183
        title: Agent-managed queue
        body: Queue integration for API and UI
        author:
          login: octocat
        headRefName: queue/api-ui
        baseRefName: main
        additions: 42
        deletions: 7
        changedFiles: 3
        reviewDecision: CHANGES_REQUESTED
      pr_context:
        url: https://github.example.test/org/repo/pull/183
        diff_availability:
          available: false
          source: gh pr diff
          error: too large
        merge_blockers:
          - kind: queue_validation_failed
            status: blocked
            summary: npm test failed for #201
        queue_context:
          is_queue: true
          strategy: merge_commits
          constituent_prs:
            - number: 201
            - number: 202
          merge_commits:
            - sha: abc201
          validation_evidence:
            - scope: "#201"
              status: failed
        conflicts:
          has_conflicts: true
          conflicting_files:
            - packages/api/src/index.ts
        ci_status:
          total_checks: 2
          passed: 1
          failed: 1
          pending: 0
          skipped: 0
          failed_checks:
            - name: npm test
              conclusion: failure
              details_url: https://ci.example.test/1
        review_comments:
          - user:
              login: reviewer
            body: Please cover the queue case.
            path: src/queue.ts
            line: 12
        comments:
          - user:
              login: maintainer
            body: Use the existing parser.
        files:
          - filename: src/queue.ts
            status: modified
            additions: 10
            deletions: 2
        commits:
          - sha: abcdef123
            commit:
              message: "Merge PR #201\n\nbody"
    assert:
      - type: contains
        value: "# PR #183: Agent-managed queue"
      - type: contains
        value: "## Merge Queue Context"
      - type: contains
        value: "RESOLVE MERGE CONFLICTS"
      - type: contains
        value: "Address ALL 1 code review comments"
      - type: contains
        value: "Fix ALL 1 failing CI checks"
      - type: contains
        value: "Source: `.merge-rules.yaml`"

  - description: Issue prompt includes implementation workflow and PR creation command
    vars:
      prompt_kind: issue
      issue_number: 77
      title: Add dry-run status report
      url: https://github.example.test/org/repo/issues/77
      body: Add a command that reports what would be processed without mutating GitHub.
      branch_name: issue-77-dry-run-status-report
      default_branch: main
      guidelines: Use strict TypeScript and node:test.
      commit_examples: "feat: add queue validation"
      merge_rules: Require local tests before PR creation.
    assert:
      - type: contains
        value: "# Issue Implementation Task"
      - type: contains
        value: "**Issue Number:** #77"
      - type: contains
        value: "gh pr create --fill --head issue-77-dry-run-status-report --base main"
      - type: contains
        value: "Closes #77"
      - type: contains
        value: "Require local tests before PR creation."

  - description: Review prompt includes diff review scope and merge rules
    vars:
      prompt_kind: review
      pr_number: 184
      title: Harden queue validation
      head_branch: queue/harden-validation
      url: https://github.example.test/org/repo/pull/184
      diff: |
        diff --git a/src/queue.ts b/src/queue.ts
        +export function validateQueue() {
        +  return true;
        +}
      changed_files:
        - filename: src/queue.ts
          status: modified
          additions: 3
          deletions: 0
      merge_rules: Security-sensitive changes require review evidence.
    assert:
      - type: contains
        value: "# Code Review: PR #184 - Harden queue validation"
      - type: contains
        value: "## Full Diff"
      - type: contains
        value: "Security-sensitive changes require review evidence."
      - type: contains
        value: "Focus on high-impact improvements"
